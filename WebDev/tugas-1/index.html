<!DOCTYPE html>
<html>
    <head>
        <title>GDGoC ITS - Registration Form</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header class="site-header">
            <h1>GDGoC ITS - Hands On</h1>
        </header>

        <main class="container">
            <section class="card">
                <h2>About the Event</h2>
                <p>Build an event registration form</p>
            </section>

            <section class="card">
                <h2>Topic Covered</h2>
                <ul>
                    <li>HTML: basic structure and semantic element</li>
                    <li>CSS: selector, layout, and styling</li>
                    <li>Javascripts: DOM, events, functions, and arrays</li>
                </ul>
            </section>
            
            <section class="card">
                <h2>Event Registration</h2>

                <from id="registration-form" class="form">
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input id="name" name="name" type="text" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="emain">Email</label>
                        <input id="email" name="email" type="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="level">Experience level</label>
                        <select id="level" name="level">
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>

                    <div class="form-group form-group-inline">
                        <label for="join-wa">
                            <input id="join-wa" name="join-wa" type="checkbox" />
                            Join WhatsApp group
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        Register
                    </button>

                    <p id="error-message" class="message error"></p>
                    <p id="success-message" class="message success"></p>
                </from>
            </section>
        </main>

        <footer class="site-footer">
            <p>Built for GDGoC ITS Web Foundations.</p>
        </footer>
        
        <script> src="script.js"</script>
    </body>
    
</html>
